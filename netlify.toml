[build]
  publish = "."

# Redirect /thank-you to the thank-you page
[[redirects]]
  from = "/thank-you"
  to = "/thank-you.html"
  status = 200

# Serve old /files/index.html visitors to the canonical root
[[redirects]]
  from = "/files/index.html"
  to = "/"
  status = 301

# Redirect broken/placeholder pages to homepage
[[redirects]]
  from = "/restaurants"
  to = "/"
  status = 301

[[redirects]]
  from = "/restaurants/"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/"
  status = 301

# Old query-param neighborhood URLs redirect to new pages
[[redirects]]
  from = "/?neighborhood=:slug"
  to = "/:slug/"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/files/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
